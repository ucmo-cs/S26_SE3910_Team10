# MariaDB connection — update credentials to match your local setup
spring.datasource.url=jdbc:mariadb://localhost:3306/appointments_db
spring.datasource.username=appointments
spring.datasource.password=appointments123
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# "update" creates/alters tables automatically to match the entity — use "validate" or "none" in production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# Serialize LocalDate/LocalDateTime as ISO strings instead of arrays (e.g. "2024-06-15" not [2024,6,15])
spring.jackson.serialization.write-dates-as-timestamps=false

# Backend runs on 8080; frontend Vite dev server runs on 3000
server.port=8080
